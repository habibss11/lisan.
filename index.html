<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Lisan</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --mute: #94a3b8; --blue: #3b82f6; --green: #10b981; --red: #ef4444; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 80px; }
    .wrap { max-width: 400px; margin: 0 auto; padding: 20px; }
    header { text-align: center; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 700; }
    p.subtitle { color: var(--mute); font-size: 14px; }
    .stats { display: flex; gap: 12px; margin-bottom: 24px; }
    .stat { flex: 1; background: var(--card); border-radius: 16px; padding: 12px 16px; text-align: center; font-size: 14px; }
    .card { height: 200px; background: var(--card); border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px 16px; cursor: pointer; position: relative; }
    .word-ar { font-size: 48px; font-family: 'Tahoma', sans-serif; text-align: center; margin-bottom: 12px; }
    .word-ru { font-size: 28px; font-weight: 500; color: var(--green); display: none; text-align: center; }
    .hint { position: absolute; bottom: 16px; color: var(--mute); font-size: 14px; }
    .actions { display: flex; justify-content: space-between; margin: 24px 0; }
    .btn { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; user-select: none; }
    .btn-red { background: var(--red); } .btn-gray { background: #334155; } .btn-green { background: var(--green); }
    .btn-next { width: 100%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 600; margin-top: 8px; }
    .footer { text-align: center; color: var(--mute); font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
<div class="wrap">
  <header><h1>Lisan</h1><p class="subtitle">Учите арабский — по одному слову за раз</p></header>
  <div class="stats"><div class="stat"><span id="learned">0</span> слов выучено</div><div class="stat"><span id="percent">0</span>% из 24 слов</div></div>
  <div class="card" onclick="toggle()"><div class="word-ar" id="ar">نَعَم</div><div class="word-ru" id="ru">да</div><div class="hint" id="hint">Нажмите, чтобы показать перевод</div></div>
  <div class="actions"><button class="btn btn-red" onclick="wrong()">✕</button><button class="btn btn-gray" onclick="toggle()">↻</button><button class="btn btn-green" onclick="correct()">✓</button></div>
  <button class="btn-next" onclick="next()">Следующее слово →</button>
  <p class="footer">Проведите пальцем вправо — знаю • влево — повторить</p>
</div>
<script>
const WORDS = [{a:'نَعَم',r:'да'},{a:'لا',r:'нет'},{a:'مرحبا',r:'привет'},{a:'شكرا',r:'спасибо'},{a:'من فضلك',r:'пожалуйста'},{a:'مع السلامة',r:'до свидания'},{a:'ماء',r:'вода'},{a:'خبز',r:'хлеб'},{a:'كتاب',r:'книга'},{a:'قلم',r:'ручка'},{a:'بيت',r:'дом'},{a:'شمس',r:'солнце'},{a:'قمر',r:'луна'},{a:'كلب',r:'собака'},{a:'قطة',r:'кошка'},{a:'طفل',r:'ребёнок'},{a:'امرأة',r:'женщина'},{a:'رجل',r:'мужчина'},{a:'يوم',r:'день'},{a:'ليل',r:'ночь'},{a:'صغير',r:'маленький'},{a:'كبير',r:'большой'},{a:'جيد',r:'хороший'},{a:'سيء',r:'плохой'}];
let idx = parseInt(localStorage.getItem('lisan_idx') || '0');
let learned = parseInt(localStorage.getItem('lisan_learned') || '0');
function update() { const w = WORDS[idx]; document.getElementById('ar').textContent = w.a; document.getElementById('ru').textContent = w.r; document.getElementById('learned').textContent = learned; document.getElementById('percent').textContent = Math.round((learned / WORDS.length) * 100); }
function toggle() { const ru = document.getElementById('ru'); const hint = document.getElementById('hint'); if (ru.style.display === 'none') { document.getElementById('ar').style.display = 'none'; ru.style.display = 'block'; hint.textContent = 'Нажмите, чтобы скрыть'; } else { ru.style.display = 'none'; document.getElementById('ar').style.display = 'block'; hint.textContent = 'Нажмите, чтобы показать перевод'; } }
function correct() { learned = Math.min(learned + 1, WORDS.length); localStorage.setItem('lisan_learned', learned.toString()); next(); }
function wrong() { next(); }
function next() { idx = (idx + 1) % WORDS.length; localStorage.setItem('lisan_idx', idx.toString()); toggle(); update(); }
update(); document.getElementById('ru').style.display = 'none';
</script>
</body>
</html>
